name: ETL — Rescued Animals (APMS 구조동물, noindex)

on:
  schedule:
    - cron: "0 20 * * *"  # 매일 05:00 KST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Check ETL secrets
        id: secrets
        run: |
          missing=0
          for k in TURSO_DATABASE_URL TURSO_AUTH_TOKEN APMS_API_KEY; do
            if [ -z "${!k}" ]; then
              echo "::notice title=Missing optional ETL secret::GitHub secret ${k} is empty; rescued animals ETL will be skipped."
              missing=1
            fi
          done
          if [ "${missing}" -eq 0 ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          APMS_API_KEY: ${{ secrets.APMS_API_KEY }}

      - name: Run APMS rescued animals ETL
        if: steps.secrets.outputs.can_run == 'true'
        run: pnpm tsx etl/apms/rescued-animals.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          APMS_API_KEY: ${{ secrets.APMS_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const webhook = process.env.ALERT_SLACK_WEBHOOK_URL;
            if (webhook) {
              await fetch(webhook, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: '⚠️ 펫지기 ETL-RescuedAnimals 실패.' }) });
            }
        env:
          ALERT_SLACK_WEBHOOK_URL: ${{ secrets.ALERT_SLACK_WEBHOOK_URL }}
