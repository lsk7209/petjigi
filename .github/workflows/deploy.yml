name: Deploy — Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: secrets
        run: |
          missing=0
          for k in VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN TURSO_DATABASE_URL TURSO_AUTH_TOKEN; do
            if [ -z "${!k}" ]; then
              echo "::notice title=Missing deploy secret::GitHub secret ${k} is empty; deployment will be skipped."
              missing=1
            fi
          done
          if [ "${missing}" -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - uses: pnpm/action-setup@v4
        if: steps.secrets.outputs.can_deploy == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.can_deploy == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.secrets.outputs.can_deploy == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.secrets.outputs.can_deploy == 'true'
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Install Vercel CLI
        if: steps.secrets.outputs.can_deploy == 'true'
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        if: steps.secrets.outputs.can_deploy == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.secrets.outputs.can_deploy == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Notify search engines (Google + IndexNow)
        if: steps.secrets.outputs.can_deploy == 'true' && success()
        run: pnpm tsx scripts/notify-published.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const webhook = process.env.ALERT_SLACK_WEBHOOK_URL;
            if (webhook) {
              await fetch(webhook, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: '⚠️ 펫지기 Vercel 배포 실패. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|워크플로우 확인>' }) });
            }
        env:
          ALERT_SLACK_WEBHOOK_URL: ${{ secrets.ALERT_SLACK_WEBHOOK_URL }}
